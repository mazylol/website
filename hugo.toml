    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "mazylol"
      logoHomeLink = "/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about"
      [[languages.en.menu.main]]
        identifier = "projects"
